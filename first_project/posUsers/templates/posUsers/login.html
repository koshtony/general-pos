<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login | Sales System</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Animated Background Shapes */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
        }

        .shape:nth-child(1) {
            height: 300px;
            width: 300px;
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            top: -10%;
            left: -5%;
            animation: move 20s infinite alternate;
        }

        .shape:nth-child(2) {
            height: 400px;
            width: 400px;
            background: linear-gradient(45deg, #8b5cf6, #d946ef);
            bottom: -15%;
            right: -5%;
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        /* Glass Login Card */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo h6 {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .brand-logo h3 {
            font-weight: 700;
            font-size: 1.75rem;
        }

        /* Crispy Form Overrides */
        .form-group label {
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            color: white !important;
            padding: 12px 15px !important;
            height: auto !important;
            transition: all 0.3s;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2) !important;
        }

        /* Password Toggle Container */
        .password-wrapper {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.3s;
            z-index: 10;
            padding: 5px;
        }

        .toggle-btn:hover {
            color: white;
        }

        .btn-login {
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .footer-text a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Responsive Mobile Adjustments */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                border-radius: 0;
                background: transparent;
                border: none;
                backdrop-filter: none;
                box-shadow: none;
            }
            .shape { display: none; }
            body { background-color: var(--bg-dark); align-items: flex-start; padding-top: 60px;}
        }
    </style>
</head>

{% load crispy_forms_tags %}

<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="login-card">
        <div class="brand-logo">
            <h6>Koshtech Sales System</h6>
            <h3>Welcome Back</h3>
        </div>

        <form method="POST" id="loginForm">
            {% csrf_token %}
            <div id="form-container">
                {{ form|crispy }}
            </div>
            
            <button class="btn-login" type="submit">
                <i class="fas fa-sign-in-alt mr-2"></i> Log In
            </button>
        </form>

        <div class="footer-text">
            Admin access required? 
            <a href="/admin">Control Panel</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Find the password input field generated by Crispy
            const passwordField = document.querySelector('input[type="password"]');
            
            if (passwordField) {
                // Wrap password field in a relative container
                const wrapper = document.createElement('div');
                wrapper.className = 'password-wrapper';
                passwordField.parentNode.insertBefore(wrapper, passwordField);
                wrapper.appendChild(passwordField);

                // Create the eye button
                const toggleBtn = document.createElement('span');
                toggleBtn.innerHTML = '<i class="fas fa-eye" id="toggleIcon"></i>';
                toggleBtn.className = 'toggle-btn';
                wrapper.appendChild(toggleBtn);

                // Add click event
                toggleBtn.addEventListener('click', function() {
                    const icon = document.getElementById('toggleIcon');
                    if (passwordField.type === "password") {
                        passwordField.type = "text";
                        icon.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        passwordField.type = "password";
                        icon.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            }
        });
    </script>
</body>
</html>
